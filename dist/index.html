<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>計算機</title>
    <style>
        /* 1. 整體背景設定 */
        body {
            background-color: #e3f2fd; /* 淺藍色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        /* 2. 計算機外殼 */
        .calculator {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
            color: #546e7a;
            margin-bottom: 20px;
            font-size: 1.2rem;
        }

        /* 3. 顯示螢幕 */
        #display {
            width: 100%;
            height: 60px;
            border: none;
            background-color: #f5f7f9;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: right;
            padding: 0 15px;
            font-size: 1.5rem;
            color: #37474f;
            box-sizing: border-box;
        }

        /* 4. 按鈕網格佈局 */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        input[type="button"] {
            height: 60px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            background-color: #eeeeee;
            color: #424242;
        }

        /* 滑鼠移上去的效果 */
        input[type="button"]:hover {
            background-color: #e0e0e0;
            transform: translateY(-2px);
        }

        /* 運算子按鈕顏色 */
        .operator {
            background-color: #bbdefb !important;
            color: #1976d2 !important;
        }

        .operator:hover {
            background-color: #90caf9 !important;
        }

        /* 等號按鈕 */
        .equal {
            background-color: #2196f3 !important;
            color: white !important;
        }

        /* 清除按鈕 */
        .clear {
            background-color: #ffcdd2 !important;
            color: #c62828 !important;
        }
    </style>
</head>
<body>

<div class="calculator">
    <h2>計算機</h2>
    <input type="text" id="display" readonly placeholder="0">
    
    <div class="buttons">
        <input type="button" value="7" onclick="appendToDisplay('7')">
        <input type="button" value="8" onclick="appendToDisplay('8')">
        <input type="button" value="9" onclick="appendToDisplay('9')">
        <input type="button" value="/" class="operator" onclick="appendToDisplay('/')">
        
        <input type="button" value="4" onclick="appendToDisplay('4')">
        <input type="button" value="5" onclick="appendToDisplay('5')">
        <input type="button" value="6" onclick="appendToDisplay('6')">
        <input type="button" value="*" class="operator" onclick="appendToDisplay('*')">
        
        <input type="button" value="1" onclick="appendToDisplay('1')">
        <input type="button" value="2" onclick="appendToDisplay('2')">
        <input type="button" value="3" onclick="appendToDisplay('3')">
        <input type="button" value="-" class="operator" onclick="appendToDisplay('-')">
        
        <input type="button" value="C" class="clear" onclick="clearDisplay()">
        <input type="button" value="0" onclick="appendToDisplay('0')">
        <input type="button" value="=" class="equal" onclick="calculate()">
        <input type="button" value="+" class="operator" onclick="appendToDisplay('+')">
    </div>
</div>

<script>
    function appendToDisplay(value) {
        document.getElementById("display").value += value;
    }

    function clearDisplay() {
        document.getElementById("display").value = '';
    }

    function calculate() {
        var expression = document.getElementById("display").value;
        try {
            // 這裡保留你的 eval 邏輯，但增加判斷空值的處理
            if(expression === "") return;
            document.getElementById("display").value = eval(expression);
        } catch (e) {
            document.getElementById("display").value = 'Error';
        }
    }
</script>

</body>
</html>
